baseURL = "https://your-domain.com/"
languageCode = "zh-cn"
title = "我的小站"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  comments = false
  hidemeta = false
  ShowFullTextinRSS = true

  [params.homeInfoParams]
    Title = "你好，欢迎来到我的小站 👋"
    Content = "这里记录自建应用折腾过程、生活随笔与摄影、读书笔记和学习总结。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/你的用户名"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 50

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
